name: Bug Report / 缺陷报告
description: 报告一个可重现的 Bug，帮助我们改进项目
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间填写此缺陷报告！请尽量提供详细信息，以便我们快速定位和修复问题。

  - type: checkboxes
    id: existing-issue
    attributes:
      label: 前置检查
      options:
        - label: 我已搜索过现有 Issues，确认此问题尚未被报告
          required: true
        - label: 我已查看最新版本，确认此问题仍然存在
          required: true

  - type: dropdown
    id: component
    attributes:
      label: 涉及组件
      options:
        - 后端 (ops-timer-backend)
        - 前端 (ops-timer-frontend)
        - Docker / 部署
        - 文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰、简洁地描述 Bug 是什么
      placeholder: 描述发生了什么…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 用于稳定复现该问题的操作步骤
      placeholder: |
        1. 进入 '...' 页面
        2. 点击 '...'
        3. 观察到错误 '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？请包含错误信息、截图或日志。
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: |
        请填写你的运行环境信息：
      value: |
        - OS: [e.g. Ubuntu 22.04 / macOS 14 / Windows 11]
        - 部署方式: [Docker Compose / 本地开发]
        - Go 版本: [e.g. 1.22]
        - Node 版本: [e.g. 20]
        - 浏览器: [e.g. Chrome 123]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 粘贴相关日志（后端日志 / 浏览器控制台）
      render: shell
