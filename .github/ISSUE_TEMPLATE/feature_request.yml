name: Feature Request / 功能建议
description: 为项目提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢您的功能建议！请尽量描述清楚你的使用场景和期望效果。

  - type: checkboxes
    id: existing-issue
    attributes:
      label: 前置检查
      options:
        - label: 我已搜索过现有 Issues，确认此功能尚未被提出
          required: true

  - type: dropdown
    id: component
    attributes:
      label: 涉及组件
      options:
        - 后端 (ops-timer-backend)
        - 前端 (ops-timer-frontend)
        - Docker / 部署
        - 文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 这个功能请求是否与某个问题有关？请描述你的使用场景。
      placeholder: 我在使用 [...] 时，发现很难做到 [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你希望实现的功能效果
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你是否考虑过其他替代实现方式？

  - type: textarea
    id: additional
    attributes:
      label: 其他补充
      description: 补充任何截图、参考链接或上下文信息
