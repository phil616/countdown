services:
  backend:
    build:
      context: ./ops-timer-backend
      dockerfile: Dockerfile
    container_name: timer-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./ops-timer-backend/config.yaml:/app/config.yaml:ro
    environment:
      - TIMER_AUTH_JWT_SECRET=${JWT_SECRET:-change_me_to_a_random_secret_in_production}

  frontend:
    build:
      context: ./ops-timer-frontend
      dockerfile: Dockerfile
    container_name: timer-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
