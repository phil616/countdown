server:
  host: "0.0.0.0"
  port: 8080
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

database:
  driver: "sqlite"
  dsn: "./data/timer.db"

auth:
  jwt_secret: "CHANGE_ME_TO_A_RANDOM_SECRET"
  jwt_expiry_hours: 24
  login_lock_attempts: 5
  login_lock_minutes: 15

scheduler:
  notification_scan_interval: "10m"

# OAuth / OIDC 单点登录配置（不填则不启用）
oauth:
  enabled: false
  issuer_url: ""          # OIDC 自发现地址，如 https://accounts.google.com
  client_id: ""           # OAuth 应用的 Client ID
  client_secret: ""       # OAuth 应用的 Client Secret
  redirect_url: ""        # 后端回调地址，如 http://localhost:8080/api/v1/auth/oauth/callback
  frontend_url: ""        # 前端地址，如 http://localhost:5173（回调成功后跳转用）
  scopes: ["openid", "email", "profile"]
  admin_emails: []        # 允许登录的邮箱白名单，留空则允许所有已认证邮箱

# SMTP 邮件通知配置（不填则不启用邮件通知）
smtp:
  host: "smtp.resend.com"           # SMTP 服务器地址，如 smtp.gmail.com / smtp.qq.com
  port: 587          # 端口：587(STARTTLS) 或 465(SSL)
  username: "resend"       # 登录用户名（通常是邮箱地址）
  password: "re_h5NzmZux_GF94qUEwpVRH1W6wQy26SrQq"       # 登录密码或授权码
  from: "计时器 <noreply@greenshadecapital.com>"           # 发件人，格式：计时器 <noreply@example.com>

log:
  level: "info"
  format: "json"
