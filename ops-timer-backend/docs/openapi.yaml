          enum: [up, down]
        note:
          type: string

    SetValueRequest:
      type: object
      required: [value]
      properties:
        value:
          type: number
        note:
          type: string

    UnitResponse:
      type: object
      required: [id, title, description, type, status, priority, tags, color, created_at, updated_at]
      properties:
        id:
          type: string
        project_id:
          type: string
          nullable: true
        title:
          type: string
        description:
          type: string
        type:
          type: string
        status:
          type: string
        priority:
          type: string
        tags:
          type: array
          items:
            type: string
        color:
          type: string
        target_time:
          type: string
          format: date-time
        start_time:
          type: string
          format: date-time
        display_unit:
          type: string
        remind_before_days:
          type: array
          items:
            type: integer
        remind_after_days:
          type: array
          items:
            type: integer
        current_value:
          type: number
        target_value:
          type: number
        step:
          type: number
        unit_label:
          type: string
        allow_exceed:
          type: boolean
        remind_on_values:
          type: array
          items:
            type: number
        remaining_seconds:
          type: number
        elapsed_seconds:
          type: number
